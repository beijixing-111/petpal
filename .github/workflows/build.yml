# =============================================================================
# PetPal CI 构建流水线
# 
# 触发条件:
#   - push: main 分支或 develop 分支的推送
#   - pull_request: 合入 main 分支或 develop 分支的 PR
#
# 包含两个构建作业:
#   - build-android: 在 ubuntu 环境构建 Android APK
#   - build-ios:     在 macOS 环境构建 iOS 应用（无签名）
# =============================================================================

name: "PetPal CI 构建流水线"

# ---------------------------------------------------------------------------
# 触发条件
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# ---------------------------------------------------------------------------
# 作业定义
# ---------------------------------------------------------------------------
jobs:

  # =========================================================================
  # 作业: build-android —— Android APK 构建
  # =========================================================================
  build-android:
    name: "构建 Android APK"
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 单个作业最长运行 30 分钟，超时自动取消

    steps:
      # 1. 检出仓库代码
      - name: "检出代码"
        uses: actions/checkout@v4

      # 2. 设置 JDK 17 运行环境（Android 构建所需）
      - name: "设置 JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 3. 安装 Flutter SDK（版本 3.19.x）
      - name: "安装 Flutter 3.19"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: "stable"

      # 4. 获取 Flutter 项目依赖
      - name: "安装 Flutter 依赖"
        run: flutter pub get

      # 5. 构建 Android Debug APK
      - name: "构建 Android Debug APK"
        run: flutter build apk --debug

      # 6. 上传 APK 构建产物，供后续流程使用
      - name: "上传 APK 构建产物"
        uses: actions/upload-artifact@v4
        # 即使前面步骤失败也尝试上传（例如已存在的部分产物）
        if: always()
        with:
          name: android-apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7  # 构建产物保留 7 天

  # =========================================================================
  # 作业: build-ios —— iOS 应用构建（无签名）
  # =========================================================================
  build-ios:
    name: "构建 iOS 应用（无签名）"
    runs-on: macos-latest
    timeout-minutes: 30  # 单个作业最长运行 30 分钟，超时自动取消

    steps:
      # 1. 检出仓库代码
      - name: "检出代码"
        uses: actions/checkout@v4

      # 2. 安装 Flutter SDK（版本 3.19.x）
      - name: "安装 Flutter 3.19"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: "stable"

      # 3. 获取 Flutter 项目依赖
      - name: "安装 Flutter 依赖"
        run: flutter pub get

      # 4. 安装 CocoaPods 依赖（仅当 ios/Podfile 存在时执行）
      - name: "安装 CocoaPods 依赖"
        run: |
          if [ -f ios/Podfile ]; then
            echo "检测到 Podfile，开始安装 CocoaPods 依赖..."
            cd ios && pod install
          else
            echo "未检测到 Podfile，跳过 CocoaPods 依赖安装。"
          fi

      # 5. 构建 iOS 应用（无签名，仅用于验证编译通过）
      - name: "构建 iOS 应用"
        run: flutter build ios --debug --no-codesign

      # 6. 上传 iOS 构建产物
      - name: "上传 iOS 构建产物"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build-output
          path: build/ios/
          retention-days: 7
