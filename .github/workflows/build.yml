# PetPal CI 构建流水线
name: "PetPal CI 构建流水线"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    name: "构建 Android APK"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "检出代码"
        uses: actions/checkout@v4

      - name: "设置 JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: "设置 Android SDK"
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: "安装 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: "stable"

      - name: "安装依赖"
        run: flutter pub get

      - name: "构建 APK"
        run: flutter build apk --debug --target-platform android-arm64

      - name: "上传 APK"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: petpal-debug.apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      - name: "上传到 Release"
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "最新 APK 构建"
          files: build/app/outputs/flutter-apk/app-debug.apk
          prerelease: true
          make_latest: true

  build-ios:
    name: "构建 iOS 应用（无签名）"
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: "检出代码"
        uses: actions/checkout@v4

      - name: "安装 Flutter"
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.19.x"
          channel: "stable"

      - name: "安装依赖"
        run: flutter pub get

      - name: "安装 CocoaPods"
        run: |
          if [ -f ios/Podfile ]; then cd ios && pod install; fi

      - name: "构建 iOS"
        run: flutter build ios --debug --no-codesign

      - name: "上传产物"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-build
          path: build/ios/
          retention-days: 7
